spring:
  application:
    name: gym
  profiles:
    active: local
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.gym
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    jdbc-type-for-null: 'null'
    default-fetch-size: 100
    default-statement-timeout: 30

logging:
  level:
    com.example.gym: debug
    org.mybatis: info
    org.springframework.data.redis: info

gym:
  default-admin:
    enabled: ${GYM_DEFAULT_ADMIN_ENABLED:true}
    username: ${GYM_DEFAULT_ADMIN_USERNAME:admin001}
    password: ${GYM_DEFAULT_ADMIN_PASSWORD:123456}
  order:
    timeout-minutes: 15
    timeout-scan-interval-ms: 60000

agent:
  base-url: ${AGENT_BASE_URL:http://localhost:8000}
  request-timeout: ${AGENT_REQUEST_TIMEOUT:180s}
