spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:gym_system}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:mt94591845}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: GymHikariPool
      minimum-idle: ${MYSQL_MIN_IDLE:5}
      maximum-pool-size: ${MYSQL_MAX_POOL_SIZE:20}
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      validation-timeout: 5000
      keepalive-time: 300000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5s
      lettuce:
        pool:
          max-active: ${REDIS_MAX_ACTIVE:16}
          max-idle: ${REDIS_MAX_IDLE:8}
          min-idle: ${REDIS_MIN_IDLE:2}
          max-wait: 3s

server:
  port: ${SERVER_PORT:8080}

frontend:
  dev-server:
    enabled: true
    working-directory: /Users/mutant/Documents/IDEA/GYM_System/frontend
    command:
      - /bin/zsh
      - -lc
      - npm run dev
